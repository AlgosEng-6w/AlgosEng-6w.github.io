<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post | My Blog</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-title">My Blog</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"></button>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <!-- Post Header -->
    <header id="post-header" class="post-header">
      <!-- Will be populated by JavaScript -->
    </header>

    <!-- Post Content -->
    <article id="post-content" class="article-content">
      <!-- Markdown content will be rendered here -->
    </article>

    <!-- Article Stats -->
    <div id="article-stats" class="article-stats">
      <!-- Stats will be populated by JavaScript -->
    </div>

    <!-- Post Navigation -->
    <nav id="post-nav" class="post-nav">
      <!-- Prev/Next navigation will be populated by JavaScript -->
    </nav>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2026 My Blog. Built with Markdown & JavaScript.</p>
  </footer>

  <script src="./assets/js/main.js"></script>
</body>
</html>
